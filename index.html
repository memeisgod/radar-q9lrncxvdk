<script>
const MARKS = [{"sym": "LABUSDT", "ts": 1783167121, "kind": "覚醒", "msg": "⚡覚醒モード LAB 突入12:10UTC (dump86/pump7)"}, {"sym": "LABUSDT", "ts": 1783183921, "kind": "支え崩れ", "msg": "🟢支え崩れ LAB 下げ本番の合図"}, {"sym": "LABUSDT", "ts": 1783212121, "kind": "支え崩れ", "msg": "🟢支え崩れ LAB 下げ本番の合図"}, {"sym": "LABUSDT", "ts": 1783224721, "kind": "覚醒候補", "msg": "👀覚醒候補 LAB CEX大量出金-3.3M$ (名簿入り仮説の観察対象)"}, {"sym": "LABUSDT", "ts": 1783296121, "kind": "覚醒候補", "msg": "👀覚醒候補 LAB CEX大量出金-8.4M$ (名簿入り仮説の観察対象)"}, {"sym": "LITUSDT", "ts": 1783311122, "kind": "覚醒候補", "msg": "👀覚醒候補 LIT CEX大量出金-0.9M$ (名簿入り仮説の観察対象)"}, {"sym": "LABUSDT", "ts": 1783382522, "kind": "覚醒候補", "msg": "👀覚醒候補 LAB CEX大量出金-9.4M$ (名簿入り仮説の観察対象)"}, {"sym": "USUSDT", "ts": 1783384322, "kind": "迎撃", "msg": "🚨使徒迎撃 US Lv2 開始00:30UTC"}, {"sym": "USUSDT", "ts": 1783384322, "kind": "反転", "msg": "🚨反転クラスタ点火 US 材料2個"}, {"sym": "USUSDT", "ts": 1783385522, "kind": "迎撃", "msg": "🚨使徒迎撃 US Lv2 開始00:50UTC"}, {"sym": "EVAAUSDT", "ts": 1783462321, "kind": "迎撃", "msg": "🚨使徒迎撃 EVAA Lv2 開始22:10UTC"}, {"sym": "EVAAUSDT", "ts": 1783462321, "kind": "反転", "msg": "🚨反転クラスタ点火 EVAA 材料2個"}, {"sym": "LABUSDT", "ts": 1783473721, "kind": "支え崩れ", "msg": "🟢支え崩れ LAB 下げ本番の合図"}, {"sym": "LDOUSDT", "ts": 1783480921, "kind": "覚醒候補", "msg": "👀覚醒候補 LDO CEX大量出金-1.0M$ (名簿入り仮説の観察対象)"}, {"sym": "EVAAUSDT", "ts": 1783491122, "kind": "迎撃", "msg": "🚨使徒迎撃 EVAA Lv2 開始06:10UTC"}, {"sym": "EVAAUSDT", "ts": 1783491122, "kind": "反転", "msg": "🚨反転クラスタ点火 EVAA 材料2個"}, {"sym": "EVAAUSDT", "ts": 1783492922, "kind": "迎撃", "msg": "🚨使徒迎撃 EVAA Lv2 開始06:40UTC"}, {"sym": "EVAAUSDT", "ts": 1783494122, "kind": "迎撃", "msg": "🚨使徒迎撃 EVAA Lv2 開始07:00UTC"}, {"sym": "EVAAUSDT", "ts": 1783507921, "kind": "迎撃", "msg": "🚨使徒迎撃 EVAA Lv3 開始10:50UTC"}, {"sym": "EVAAUSDT", "ts": 1783513321, "kind": "迎撃", "msg": "🚨使徒迎撃 EVAA Lv2 開始12:20UTC"}, {"sym": "EVAAUSDT", "ts": 1783519921, "kind": "暴走", "msg": "🔥暴走相当 EVAA 両翼(ランプ+OI減)×反転点火!"}, {"sym": "EVAAUSDT", "ts": 1783519921, "kind": "支え崩れ", "msg": "🟢支え崩れ EVAA 下げ本番の合図"}, {"sym": "EVAAUSDT", "ts": 1783520521, "kind": "迎撃", "msg": "🚨使徒迎撃 EVAA Lv2 開始14:20UTC"}, {"sym": "SYNUSDT", "ts": 1783521121, "kind": "覚醒候補", "msg": "👀覚醒候補 SYN CEX大量出金-1.0M$ (名簿入り仮説の観察対象)"}, {"sym": "EVAAUSDT", "ts": 1783528350, "kind": "迎撃", "msg": "🚨使徒迎撃 EVAA Lv2 開始16:30UTC"}, {"sym": "EVAAUSDT", "ts": 1783546322, "kind": "迎撃", "msg": "🚨使徒迎撃 EVAA Lv2 開始21:30UTC"}, {"sym": "LABUSDT", "ts": 1783555322, "kind": "支え崩れ", "msg": "🟢支え崩れ LAB 下げ本番の合図"}];
const SYMBOLS = ["LABUSDT", "EVAAUSDT", "SYNUSDT", "LDOUSDT", "USUSDT", "LITUSDT"];
const IVSEC = {'5m':300,'15m':900,'1h':3600,'4h':14400};
const STYLE = {
  '覚醒':     {color:'#f7931a', shape:'arrowUp',   pos:'belowBar'},
  'BEAST':    {color:'#3498db', shape:'arrowUp',   pos:'belowBar'},
  '覚醒候補':  {color:'#00bcd4', shape:'circle',    pos:'belowBar'},
  '迎撃':     {color:'#e74c3c', shape:'arrowDown', pos:'aboveBar'},
  '反転':     {color:'#e74c3c', shape:'arrowDown', pos:'aboveBar'},
  '暴走':     {color:'#e91e63', shape:'arrowDown', pos:'aboveBar'},
  '支え崩れ':  {color:'#2ecc71', shape:'arrowDown', pos:'aboveBar'},
};
let sym = SYMBOLS[0], iv = '1h';

// ---- チャート ----
const el = document.getElementById('chart');
const chart = LightweightCharts.createChart(el, {
  height: 520,
  layout: {background:{color:'#12141c'}, textColor:'#8b93a1'},
  grid: {vertLines:{color:'#1c2030'}, horzLines:{color:'#1c2030'}},
  timeScale: {timeVisible:true, secondsVisible:false, borderColor:'#2a2f3f'},
  rightPriceScale: {borderColor:'#2a2f3f'},
  crosshair: {mode: LightweightCharts.CrosshairMode.Normal},
  localization: {locale:'ja-JP'},
});
const candles = chart.addCandlestickSeries({
  upColor:'#2ecc71', downColor:'#e74c3c', wickUpColor:'#2ecc71',
  wickDownColor:'#e74c3c', borderVisible:false});
const vol = chart.addHistogramSeries({priceFormat:{type:'volume'}, priceScaleId:'v'});
chart.priceScale('v').applyOptions({scaleMargins:{top:0.82, bottom:0}});
// ボリンジャーバンド (標準: SMA20 ±2σ)
const bbMid = chart.addLineSeries({color:'#f1c40f', lineWidth:1, priceLineVisible:false, lastValueVisible:false});
const bbUp  = chart.addLineSeries({color:'#2196f3', lineWidth:1, priceLineVisible:false, lastValueVisible:false});
const bbLo  = chart.addLineSeries({color:'#2196f3', lineWidth:1, priceLineVisible:false, lastValueVisible:false});
// 移動平均線 (SMA 100/200/300)
const maSeries = [
  {p:100, s:chart.addLineSeries({color:'#26c6da', lineWidth:1, priceLineVisible:false, lastValueVisible:false})},
  {p:200, s:chart.addLineSeries({color:'#ab47bc', lineWidth:1, priceLineVisible:false, lastValueVisible:false})},
  {p:300, s:chart.addLineSeries({color:'#ef5350', lineWidth:1, priceLineVisible:false, lastValueVisible:false})},
];
function sma(closes, times, period){
  const out=[]; let s=0;
  for(let i=0;i<closes.length;i++){
    s+=closes[i];
    if(i>=period) s-=closes[i-period];
    if(i>=period-1) out.push({time:times[i], value:s/period});
  }
  return out;
}
function bollinger(closes, times, period=20, mult=2){
  const mid=[], up=[], lo=[];
  for(let i=0;i<closes.length;i++){
    if(i<period-1) continue;
    let s=0; for(let j=i-period+1;j<=i;j++) s+=closes[j];
    const m=s/period;
    let v=0; for(let j=i-period+1;j<=i;j++) v+=(closes[j]-m)**2;
    const sd=Math.sqrt(v/period);
    mid.push({time:times[i], value:m});
    up.push({time:times[i], value:m+mult*sd});
    lo.push({time:times[i], value:m-mult*sd});
  }
  return {mid, up, lo};
}
// ---- SMC Toolkit (RSI反転/EMA75-200/レガシー/スイング/FVG/一目基準線/ALMA) ----
const emaFast = chart.addLineSeries({color:'#26a69a', lineWidth:1, priceLineVisible:false, lastValueVisible:false});
const emaSlow = chart.addLineSeries({color:'#ffa726', lineWidth:1, priceLineVisible:false, lastValueVisible:false});
const kijun   = chart.addLineSeries({lineWidth:2, priceLineVisible:false, lastValueVisible:false});
const almaL   = chart.addLineSeries({color:'rgba(150,150,150,0.35)', lineWidth:1, priceLineVisible:false, lastValueVisible:false});
const legacyL = chart.addLineSeries({color:'#ffeb3b', lineWidth:2, priceScaleId:'legacyScale', priceLineVisible:false, lastValueVisible:false});
chart.priceScale('legacyScale').applyOptions({scaleMargins:{top:0.85, bottom:0}});
let smcOn = true, curKl = null, radarMarkers = [], smcMarkers = [], fvgList = [];
const ic = document.getElementById('ind'), ictx = ic.getContext('2d');

function ema(a,p){const k=2/(p+1);const o=[];let e=null;for(const v of a){e=e==null?v:v*k+e*(1-k);o.push(e);}return o;}
function donch(h,l,len){const o=Array(h.length).fill(null);for(let i=len-1;i<h.length;i++){let hh=-1e18,ll=1e18;for(let j=i-len+1;j<=i;j++){hh=Math.max(hh,h[j]);ll=Math.min(ll,l[j]);}o[i]=(hh+ll)/2;}return o;}
function rsiCalc(c,p){const o=Array(c.length).fill(null);if(c.length<=p)return o;let g=0,l=0;for(let i=1;i<=p;i++){const ch=c[i]-c[i-1];g+=Math.max(ch,0);l+=Math.max(-ch,0);}g/=p;l/=p;o[p]=l===0?100:100-100/(1+g/l);for(let i=p+1;i<c.length;i++){const ch=c[i]-c[i-1];g=(g*(p-1)+Math.max(ch,0))/p;l=(l*(p-1)+Math.max(-ch,0))/p;o[i]=l===0?100:100-100/(1+g/l);}return o;}
function stochK(c,h,l,p){const o=Array(c.length).fill(null);for(let i=p-1;i<c.length;i++){let hh=-1e18,ll=1e18;for(let j=i-p+1;j<=i;j++){hh=Math.max(hh,h[j]);ll=Math.min(ll,l[j]);}o[i]=hh===ll?0:100*(c[i]-ll)/(hh-ll);}return o;}
function sma3(a){const o=Array(a.length).fill(null);for(let i=2;i<a.length;i++){if(a[i]==null||a[i-1]==null||a[i-2]==null)continue;o[i]=(a[i]+a[i-1]+a[i-2])/3;}return o;}
function macdSignal(c){const e12=ema(c,12),e26=ema(c,26);const m=c.map((_,i)=>e12[i]-e26[i]);return ema(m,9);}
function almaCalc(a,win,off,sig){const o=Array(a.length).fill(null);const m=off*(win-1),s=win/sig;const w=[];let norm=0;for(let i=0;i<win;i++){const x=Math.exp(-((i-m)**2)/(2*s*s));w.push(x);norm+=x;}for(let i=win-1;i<a.length;i++){let sum=0,ok=true;for(let j=0;j<win;j++){const v=a[i-(win-1)+j];if(v==null){ok=false;break;}sum+=v*w[j];}o[i]=ok?sum/norm:null;}return o;}

function setAllMarkers(){
  candles.setMarkers([...radarMarkers, ...smcMarkers].sort((a,b)=>a.time-b.time));
}
function sizeInd(){ ic.width=el.clientWidth; ic.height=el.clientHeight; ic.style.width=el.clientWidth+'px'; ic.style.height=el.clientHeight+'px'; }
function redrawInd(){
  sizeInd(); ictx.clearRect(0,0,ic.width,ic.height);
  if(!smcOn) return;
  for(const f of fvgList){
    const x1=chart.timeScale().timeToCoordinate(f.t1), x2=chart.timeScale().timeToCoordinate(f.t2);
    const yt=candles.priceToCoordinate(f.top), yb=candles.priceToCoordinate(f.bot);
    if(x1==null||x2==null||yt==null||yb==null) continue;
    ictx.fillStyle='rgba(255,235,59,0.16)';
    ictx.fillRect(x1, Math.min(yt,yb), Math.max(2,x2-x1), Math.abs(yb-yt));
  }
}
function applySMC(){
  const vis = !!(smcOn && curKl);
  [kijun,almaL].forEach(s=>s.applyOptions({visible:vis}));
  [emaFast,emaSlow,legacyL].forEach(s=>s.applyOptions({visible:false}));  // レガシー/EMA非表示 (2026-07-09)
  smcMarkers=[]; fvgList=[];
  if(!vis){ setAllMarkers(); redrawInd(); return; }
  try{
    const kl=curKl;
    const t=kl.map(k=>k[0]/1000), h=kl.map(k=>+k[2]), l=kl.map(k=>+k[3]), c=kl.map(k=>+k[4]);
    const conv=donch(h,l,5), base=donch(h,l,34);
    const kd=[]; for(let i=0;i<t.length;i++){ if(base[i]==null) continue;
      const col=conv[i]>base[i]?'#2196f3':conv[i]<base[i]?'#ef5350':'#ffa726'; kd.push({time:t[i],value:base[i],color:col}); }
    kijun.setData(kd);
    almaL.setData(t.map((tt,i)=>({time:tt,value:almaCalc(base,34,0.85,6)[i]})).filter(p=>p.value!=null));
    const dS=sma3(stochK(c,h,l,14)), mS=macdSignal(c);
    // RSI反転 + レガシーフィルタ
    const r=rsiCalc(c,14); let lastOver=null,lastUnder=null;
    for(let i=0;i<c.length;i++){
      const ov=r[i]!=null&&r[i]>70, un=r[i]!=null&&r[i]<30;
      if(ov) lastOver=h[i]; if(un) lastUnder=l[i];
      if(!ov&&lastOver!=null&&h[i]>lastOver) smcMarkers.push({time:t[i],position:'aboveBar',color:'#e74c3c',shape:'arrowDown',size:1});
      if(!un&&lastUnder!=null&&l[i]<lastUnder) smcMarkers.push({time:t[i],position:'belowBar',color:'#2ecc71',shape:'arrowUp',size:1});
      if(dS[i]!=null&&mS[i]!=null&&r[i]!=null){ const lv=(dS[i]+mS[i])/2;
        if(lv>80&&r[i]>70) smcMarkers.push({time:t[i],position:'aboveBar',color:'#c0392b',shape:'arrowDown',size:1});
        if(lv<20&&r[i]<30) smcMarkers.push({time:t[i],position:'belowBar',color:'#27ae60',shape:'arrowUp',size:1}); }
    }
    // スイング高安 (pivot 2/2)
    for(let i=2;i<t.length-2;i++){
      if(h[i]>h[i-1]&&h[i]>h[i-2]&&h[i]>h[i+1]&&h[i]>h[i+2]) smcMarkers.push({time:t[i],position:'aboveBar',color:'#e74c3c',shape:'circle',size:1});
      if(l[i]<l[i-1]&&l[i]<l[i-2]&&l[i]<l[i+1]&&l[i]<l[i+2]) smcMarkers.push({time:t[i],position:'belowBar',color:'#2ecc71',shape:'circle',size:1});
    }
    // FVG (imbalance)
    for(let i=2;i<t.length;i++){
      if(l[i]>h[i-2]) fvgList.push({t1:t[i-1],t2:t[i],top:l[i],bot:h[i-2]});
      if(h[i]<l[i-2]) fvgList.push({t1:t[i-1],t2:t[i],top:l[i-2],bot:h[i]});
    }
  }catch(e){ console.log('SMC error', e); }
  setAllMarkers(); redrawInd();
}
document.getElementById('smcBtn').classList.add('on');
document.getElementById('smcBtn').onclick = function(){ smcOn=!smcOn; this.classList.toggle('on',smcOn); applySMC(); };
chart.timeScale().subscribeVisibleTimeRangeChange(redrawInd);
new ResizeObserver(redrawInd).observe(el);
new ResizeObserver(() => chart.applyOptions({width: el.clientWidth})).observe(el);

async function load(){
  const urls = [`https://fapi.binance.com/fapi/v1/klines?symbol=${sym}&interval=${iv}&limit=500`,
                `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${iv}&limit=500`];
  let kl = null;
  for (const u of urls){
    try { const r = await fetch(u); if (r.ok){ kl = await r.json(); break; } } catch(e){}
  }
  if (!kl){ document.getElementById('status').textContent = '● データ取得失敗 ' + sym; return; }
  candles.setData(kl.map(k => ({time: k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4]})));
  vol.setData(kl.map(k => ({time: k[0]/1000, value:+k[5],
                            color: +k[4] >= +k[1] ? '#1e4d36' : '#57272c'})));
  const closes = kl.map(k => +k[4]), times = kl.map(k => k[0]/1000);
  const bb = bollinger(closes, times);
  bbMid.setData(bb.mid); bbUp.setData(bb.up); bbLo.setData(bb.lo);
  maSeries.forEach(m => m.s.setData(sma(closes, times, m.p)));
  // レーダー反応マーカー (バー時刻に丸めて重ね表示)
  const sec = IVSEC[iv], t0 = kl[0][0]/1000;
  radarMarkers = MARKS.filter(m => m.sym === sym && m.ts >= t0)
    .map(m => {
      const s = STYLE[m.kind] || {color:'#aaa', shape:'circle', pos:'aboveBar'};
      return {time: Math.floor(m.ts/sec)*sec, position: s.pos, color: s.color,
              shape: s.shape, text: m.kind};
    });
  curKl = kl;
  applySMC();
  document.getElementById('status').textContent = '● ' + new Date().toLocaleTimeString('ja-JP');
  if (typeof loadDrawings === 'function'){ loadDrawings(); resizeCanvas(); }
}

// ---- UI ----
const symsDiv = document.getElementById('syms');
SYMBOLS.forEach(s => {
  const b = document.createElement('span');
  const n = MARKS.filter(m => m.sym === s).length;
  b.className = 'btn sym' + (s === sym ? ' on' : '');
  b.textContent = s.replace('USDT','') + (n ? ` (${n})` : '');
  b.dataset.sym = s;
  b.onclick = () => { sym = s; sel('.sym', b); load(); };
  symsDiv.appendChild(b);
});
document.querySelectorAll('.iv').forEach(b =>
  b.onclick = () => { iv = b.dataset.iv; sel('.iv', b); load(); });
function sel(cls, el2){ document.querySelectorAll(cls).forEach(x => x.classList.remove('on')); el2.classList.add('on'); }

// 反応フィード (クリックでその銘柄へ)
document.getElementById('feed').innerHTML = '<b>レーダー反応履歴 (直近14日・JST)</b><br>' +
  MARKS.slice().sort((a,b) => b.ts - a.ts).map(m => {
    const d = new Date(m.ts*1000);
    const t = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const c = (STYLE[m.kind]||{color:'#aaa'}).color;
    return `<div class="feeditem" onclick="jump('${m.sym}')">` +
           `<span style="color:${c}">■</span> ${t} ${m.msg}</div>`;
  }).join('');
// ---- 描画ツール (タップ2点方式・iPhone最適化・端末localStorageに銘柄×足別保存) ----
let tool = 'cursor', drawings = [], pending = null, hover = null;
const dc = document.getElementById('draw'), dctx = dc.getContext('2d');
const hintEl = document.getElementById('hint');
const FIB = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
const LABELS = {trend:'トレンドライン', hline:'水平線', fib:'フィボナッチ'};
function dkey(){ return `draw_${sym}_${iv}`; }
function loadDrawings(){ try { drawings = JSON.parse(localStorage.getItem(dkey())||'[]'); } catch(e){ drawings=[]; } if(!Array.isArray(drawings)) drawings=[]; }
function saveDrawings(){ localStorage.setItem(dkey(), JSON.stringify(drawings)); }
function setHint(t){ hintEl.textContent = t || ''; }

document.querySelectorAll('.tool').forEach(b => b.onclick = () => {
  tool = b.dataset.tool; sel('.tool', b); pending = null;
  dc.classList.toggle('active', tool !== 'cursor');
  if(tool==='cursor') setHint('');
  else if(tool==='hline') setHint('引きたい価格をタップ');
  else setHint(`${LABELS[tool]}: 1点目をタップ`);
  redraw();
});
document.getElementById('undo').onclick = () => { pending=null; drawings.pop(); saveDrawings(); redraw(); };
document.getElementById('clr').onclick = () => { if(confirm('この銘柄・足の描画を全消去?')){ drawings=[]; pending=null; saveDrawings(); redraw(); } };

function toXY(pt){
  const x = chart.timeScale().timeToCoordinate(pt.t);
  const y = candles.priceToCoordinate(pt.p);
  return (x==null||y==null) ? null : {x, y};
}
function fromXY(x, y){ return {t: chart.timeScale().coordinateToTime(x), p: candles.coordinateToPrice(y)}; }
function resizeCanvas(){
  dc.width = el.clientWidth; dc.height = el.clientHeight;
  dc.style.width = el.clientWidth+'px'; dc.style.height = el.clientHeight+'px';
  redraw();
}
function redraw(){
  dctx.clearRect(0,0,dc.width,dc.height);
  for(const d of drawings) paint(d);
  if(pending){
    // 確定済み1点目を大きめの掴みやすいマーカーで表示 + プレビュー
    if(hover) paint({type:tool, a:pending, b:hover, color:'#f7931a', preview:true});
    const a = toXY(pending);
    if(a){ dctx.fillStyle='#f7931a'; dctx.beginPath(); dctx.arc(a.x,a.y,6,0,7); dctx.fill(); }
  }
}
function paint(d){
  dctx.lineWidth = d.preview ? 1 : 1.8;
  dctx.setLineDash(d.preview ? [4,4] : []);
  dctx.strokeStyle = d.color || '#f7931a'; dctx.font='12px sans-serif';
  if(d.type==='hline'){
    const y = candles.priceToCoordinate(d.p); if(y==null){ dctx.setLineDash([]); return; }
    dctx.beginPath(); dctx.moveTo(0,y); dctx.lineTo(dc.width,y); dctx.stroke();
    dctx.fillStyle=d.color||'#f7931a'; dctx.fillText(d.p.toPrecision(6), 4, y-4);
  } else if(d.type==='trend'){
    const a=toXY(d.a), b=toXY(d.b); if(!a||!b){ dctx.setLineDash([]); return; }
    dctx.beginPath(); dctx.moveTo(a.x,a.y); dctx.lineTo(b.x,b.y); dctx.stroke();
  } else if(d.type==='fib'){
    const a=toXY(d.a), b=toXY(d.b); if(!a||!b){ dctx.setLineDash([]); return; }
    for(const f of FIB){
      const p = d.a.p + (d.b.p - d.a.p)*f;
      const y = candles.priceToCoordinate(p); if(y==null) continue;
      dctx.strokeStyle = f===0||f===1 ? '#e74c3c' : '#f7931a';
      dctx.beginPath(); dctx.moveTo(Math.min(a.x,b.x),y); dctx.lineTo(dc.width,y); dctx.stroke();
      dctx.fillStyle='#aeb6c2'; dctx.fillText(`${(f*100).toFixed(1)}% ${p.toPrecision(6)}`, Math.min(a.x,b.x)+4, y-4);
    }
  }
  dctx.setLineDash([]);
}
function evtXY(e){
  const r = dc.getBoundingClientRect();
  const src = e.changedTouches ? e.changedTouches[0] : e;
  return {cx: src.clientX - r.left, cy: src.clientY - r.top};
}
// タップ確定方式: 1点目タップ→(プレビュー)→2点目タップで確定。水平線は1タップ。確定でカーソルに戻す。
function onTap(e){
  if(tool==='cursor') return;
  e.preventDefault();
  const {cx,cy} = evtXY(e); const pt = fromXY(cx,cy);
  if(pt.t==null||pt.p==null) return;
  if(tool==='hline'){
    drawings.push({type:'hline', p:pt.p, color:'#f7931a'}); saveDrawings();
    backToCursor(); return;
  }
  if(!pending){ pending = {t:pt.t, p:pt.p}; setHint(`${LABELS[tool]}: 2点目をタップ`); redraw(); }
  else { drawings.push({type:tool, a:pending, b:{t:pt.t,p:pt.p}, color:'#f7931a'});
         pending=null; saveDrawings(); backToCursor(); }
}
function onHover(e){
  if(!pending) return;
  const {cx,cy} = evtXY(e); hover = fromXY(cx,cy); redraw();
}
function backToCursor(){
  tool='cursor'; hover=null;
  document.querySelectorAll('.tool').forEach(x => x.classList.toggle('on', x.dataset.tool==='cursor'));
  dc.classList.remove('active'); setHint(''); redraw();
}
dc.addEventListener('pointerdown', onTap);
dc.addEventListener('pointermove', onHover);
chart.timeScale().subscribeVisibleTimeRangeChange(redraw);
new ResizeObserver(resizeCanvas).observe(el);

function jump(s){
  sym = s;
  document.querySelectorAll('.sym').forEach(x =>
    x.classList.toggle('on', x.dataset.sym === s));
  load();
  window.scrollTo({top:0, behavior:'smooth'});
}

load();
setInterval(load, 60000);
</script></body></html>
