function sma(closes, times, period){
  const out=[]; let s=0;
  for(let i=0;i<closes.length;i++){
    s+=closes[i];
    if(i>=period) s-=closes[i-period];
    if(i>=period-1) out.push({time:times[i], value:s/period});
  }
  return out;
}
function bollinger(closes, times, period=20, mult=2){
  const mid=[], up=[], lo=[];
  for(let i=0;i<closes.length;i++){
    if(i<period-1) continue;
    let s=0; for(let j=i-period+1;j<=i;j++) s+=closes[j];
    const m=s/period;
    let v=0; for(let j=i-period+1;j<=i;j++) v+=(closes[j]-m)**2;
    const sd=Math.sqrt(v/period);
    mid.push({time:times[i], value:m});
    up.push({time:times[i], value:m+mult*sd});
    lo.push({time:times[i], value:m-mult*sd});
  }
  return {mid, up, lo};
}

function ema(a,p){const k=2/(p+1);const o=[];let e=null;for(const v of a){e=e==null?v:v*k+e*(1-k);o.push(e);}return o;}
function donch(h,l,len){const o=Array(h.length).fill(null);for(let i=len-1;i<h.length;i++){let hh=-1e18,ll=1e18;for(let j=i-len+1;j<=i;j++){hh=Math.max(hh,h[j]);ll=Math.min(ll,l[j]);}o[i]=(hh+ll)/2;}return o;}
function rsiCalc(c,p){const o=Array(c.length).fill(null);if(c.length<=p)return o;let g=0,l=0;for(let i=1;i<=p;i++){const ch=c[i]-c[i-1];g+=Math.max(ch,0);l+=Math.max(-ch,0);}g/=p;l/=p;o[p]=l===0?100:100-100/(1+g/l);for(let i=p+1;i<c.length;i++){const ch=c[i]-c[i-1];g=(g*(p-1)+Math.max(ch,0))/p;l=(l*(p-1)+Math.max(-ch,0))/p;o[i]=l===0?100:100-100/(1+g/l);}return o;}
function stochK(c,h,l,p){const o=Array(c.length).fill(null);for(let i=p-1;i<c.length;i++){let hh=-1e18,ll=1e18;for(let j=i-p+1;j<=i;j++){hh=Math.max(hh,h[j]);ll=Math.min(ll,l[j]);}o[i]=hh===ll?0:100*(c[i]-ll)/(hh-ll);}return o;}
function sma3(a){const o=Array(a.length).fill(null);for(let i=2;i<a.length;i++){if(a[i]==null||a[i-1]==null||a[i-2]==null)continue;o[i]=(a[i]+a[i-1]+a[i-2])/3;}return o;}
function macdSignal(c){const e12=ema(c,12),e26=ema(c,26);const m=c.map((_,i)=>e12[i]-e26[i]);return ema(m,9);}
function almaCalc(a,win,off,sig){const o=Array(a.length).fill(null);const m=off*(win-1),s=win/sig;const w=[];let norm=0;for(let i=0;i<win;i++){const x=Math.exp(-((i-m)**2)/(2*s*s));w.push(x);norm+=x;}for(let i=win-1;i<a.length;i++){let sum=0,ok=true;for(let j=0;j<win;j++){const v=a[i-(win-1)+j];if(v==null){ok=false;break;}sum+=v*w[j];}o[i]=ok?sum/norm:null;}return o;}

// ---- エントリー助言テキスト自動生成 (ライブ指標+レーダー反応+検証知見をルール合成。60秒毎更新) ----
function composeAdvice(closes, rsiArr, bb){
  try{
    const n=closes.length, price=closes[n-1];
    let rNow=null; for(let i=n-1;i>=0;i--){ if(rsiArr[i]!=null){ rNow=rsiArr[i]; break; } }
    const ef=ema(closes,75), es=ema(closes,200);
    const e75=ef[n-1], e200=es[n-1];
    const up = e75>e200;                                   // EMAトレンドバイアス
    const bbU=bb.up.length?bb.up[bb.up.length-1].value:null;
    const bbL=bb.lo.length?bb.lo[bb.lo.length-1].value:null;
    const pctb = (bbU!=null&&bbL!=null&&bbU>bbL) ? (price-bbL)/(bbU-bbL) : null;  // %b (0=下限,1=上限)
    const nowSec=Date.now()/1000;
    const recent = MARKS.filter(m=>m.sym===sym && nowSec-m.ts < 3*86400).map(m=>m.kind);
    const has = k => recent.includes(k);

    const reasons=[];
    reasons.push(`トレンド: <b style="color:${up?'#2ecc71':'#e74c3c'}">${up?'上昇バイアス':'下降バイアス'}</b> (EMA75 ${up?'>':'<'} EMA200)`);
    // RSI × CAT ゾーン
    if(rNow!=null){
      let z;
      if(rNow>=RSI_RED[0]) z='🔴トレンド強度ゾーン (買われすぎではなく強さの確認)';
      else if(rNow>=50) z='中立〜強気圏';
      else if(rNow>=RSI_GREEN[0]) z='🟢需要サポートゾーン (押し目の支え)';
      else z='⚠緑ゾーン割れ (押し目か下落か不明)';
      reasons.push(`RSI ${rNow.toFixed(1)}: ${z}`);
    }
    if(pctb!=null){
      const pos = pctb>=0.85?'上限付近 (過熱)':pctb<=0.15?'下限付近 (売られすぎ)':pctb>=0.55?'中央より上':pctb<=0.45?'中央より下':'中央';
      reasons.push(`ボリンジャー: 価格は${pos} (%b=${(pctb*100).toFixed(0)}%)`);
    }
    if(recent.length) reasons.push(`直近3日のレーダー: ${[...new Set(recent)].join(' / ')}`);

    // スタンス判定
    let stance, color, entry, exit;
    if(has('覚醒')){
      stance='⚡ 覚醒銘柄 — 出口前提で'; color='#f7931a';
      entry='仕込み＋急騰の本命。乗るなら押し目、ただしボラ極大。入金ランプ/反転が出たら即降り準備。';
      exit='利確: 一撃を狙い広めトレーリング。半利確＋建値ストップで負けを消す(作者手法)。';
    } else if(has('暴走')||has('使徒迎撃')||has('反転')||has('支え崩れ')){
      stance='🔻 戻り売り目線 — 下げ本番の兆候'; color='#e74c3c';
      entry='反発（戻り）を戻り売り。飛び乗りロングは避ける。';
      exit='ショートは distribution系ほどDD浅め。+建値SLで守る。';
    } else if(has('覚醒候補')){
      stance='👀 仕込み観測中 — 急騰の芽'; color='#00bcd4';
      entry='大口がCEXへ大量出金＝蓄積の可能性。BEAST点火(blowoff×急騰)を待って初動を。';
      exit='点火したらロング、広めトレーリングで裾を残す。';
    } else if(up && rNow!=null && rNow>=RSI_GREEN[0] && rNow<=55 && (pctb==null||pctb<=0.5)){
      stance='🟢 押し目買いを探す'; color='#2ecc71';
      entry=`上昇トレンド中の押し目。RSIが緑ゾーン(${RSI_GREEN[0]}-${RSI_GREEN[1]})で反発を確認して買い。緑ゾーンを下抜けたら見送り。`;
      exit='利確は広めトレーリング推奨(検証: 固定TPは期待値薄・右裾を残すほど有利)。';
    } else if(up && rNow!=null && rNow>=RSI_RED[0]){
      stance='🟦 強いトレンド継続 — 押し目待ち'; color='#3498db';
      entry='RSIが赤ゾーン突破＝上昇の強さの確認。買われすぎと逆張りせず、次の押し目を待つ。';
      exit='トレンドフォロー、トレーリングで追随。';
    } else if(!up && rNow!=null && rNow<RSI_GREEN[0]){
      stance='⚪ 様子見 — 需要ゾーン割れ'; color='#8b93a1';
      entry='RSIが緑ゾーン下。強い下落か押し目か判別困難。新規は控える。';
      exit='—';
    } else {
      stance='⚪ 様子見'; color='#8b93a1';
      entry='明確な優位性なし。レーダー反応かRSIゾーンでの反応を待つ。';
      exit='—';
    }
    const html = `<div class="stance" style="color:${color}">${stance}</div>`
      + `<div>${entry}</div>`
      + `<ul>${reasons.map(r=>`<li>${r}</li>`).join('')}</ul>`
      + (exit!=='—'?`<div>🎯 ${exit}</div>`:'')
      + `<div class="nfa">${sym.replace('USDT','')} ${iv} / 自動生成(ルールベース) ${new Date().toLocaleTimeString('ja-JP')} ・ 投資助言ではありません(DYOR)</div>`;
    document.getElementById('advice').innerHTML = html;
  }catch(e){ document.getElementById('advice').textContent='解析エラー'; console.log('advice',e); }
}

async function load(fit){

                `https://api.binance.com/api/v3/klines?symbol=${sym}&interval=${iv}&limit=500`];
  let kl = null;
  for (const u of urls){
    try { const r = await fetch(u); if (r.ok){ kl = await r.json(); break; } } catch(e){}
  }
  if (!Array.isArray(kl) || kl.length===0){
    document.getElementById('status').textContent = '● 取得失敗 ' + sym + ' (別銘柄をタップ/自動再試行)';
    document.getElementById('advice').innerHTML = '<span class="dim">'+sym.replace('USDT','')+' の価格データを取得できませんでした。銘柄タブを切り替えてください。</span>';

  }
  candles.setData(kl.map(k => ({time: k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4]})));
  vol.setData(kl.map(k => ({time: k[0]/1000, value:+k[5],
                            color: +k[4] >= +k[1] ? '#1e4d36' : '#57272c'})));
  // 価格の大きさに応じて小数桁を自動調整 (低価格銘柄が2桁だと潰れるため)
  const lp = +kl[kl.length-1][4];
  const prec = lp>=100 ? 2 : lp>=1 ? 4 : lp>=0.01 ? 6 : lp>=0.0001 ? 8 : 10;
  candles.applyOptions({priceFormat:{type:'price', precision:prec, minMove:Math.pow(10,-prec)}});
  const closes = kl.map(k => +k[4]), times = kl.map(k => k[0]/1000);
  const bb = bollinger(closes, times);
  bbMid.setData(bb.mid); bbUp.setData(bb.up); bbLo.setData(bb.lo);
  maSeries.forEach(m => { m.s.setData(sma(closes, times, m.p)); m.s.applyOptions({visible:false}); });  // MA非表示 (2026-07-09)
  const rsiArr = rsiCalc(closes, 14);
  // ローソクと本数を完全一致させる (null期間は時刻のみの空データ=ホワイトスペースで埋める)。

    .map(m => {
      const s = STYLE[m.kind] || {color:'#aaa', shape:'circle', pos:'aboveBar'};
      return {time: Math.floor(m.ts/sec)*sec, position: s.pos, color: s.color,
              shape: s.shape, text: m.kind};
    });
  curKl = kl;
  curTimes = times;
  applySMC();
  const hr = new Date().getHours();
  if(fit || hr!==lastAdviceHour){ composeAdvice(closes, rsiArr, bb); lastAdviceHour=hr; }
  document.getElementById('status').textContent = '● ' + new Date().toLocaleTimeString('ja-JP');
  if (typeof loadDrawings === 'function'){ loadDrawings(); resizeCanvas(); }
  if (fit){ chart.priceScale('right').applyOptions({autoScale:true}); chart.timeScale().fitContent(); }
}

function heatOf(s){
  const now=Date.now()/1000; let h=0, lt=0, latest=null;
  for(const m of MARKS){ if(m.sym!==s) continue;
    const age=(now-m.ts)/3600; h += (SEV[m.kind]||1)*Math.exp(-age/8);   // 半減期≈約5.5h
    if(m.ts>lt){ lt=m.ts; latest=m.kind; } }
  return {h, latest};
}

// ---- 描画ツール (タップ2点方式・iPhone最適化・端末localStorageに銘柄×足別保存) ----
let tool = 'cursor', drawings = [], hover = null, copyState = null, moveState = null, magnetOn = true;
let phase = null, draftA = null, draftB = null;   // 2点ツールの仮置き編集state
let curTimes = [];                                 // 現在足のバー時刻(秒)配列 = 時刻→座標補間用
const dc = document.getElementById('draw'), dctx = dc.getContext('2d');
const hintEl = document.getElementById('hint');
const FIB = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
const LABELS = {trend:'レイ', hline:'水平線', fib:'フィボナッチ', copy:'複写', move:'移動', alert:'価格通知', del:'個別消去'};
// 描画は銘柄ごとに保存 (全時間足で共通表示。価格・時刻は絶対値なので足を跨いでも正しい位置に出る)
function dkey(){ return `draw_${sym}`; }
function loadDrawings(){
  try { drawings = JSON.parse(localStorage.getItem(dkey())||'[]'); } catch(e){ drawings=[]; }
  if(!Array.isArray(drawings)) drawings=[];
  if(drawings.length===0){   // 旧 per-timeframe キーから一度だけ移行
    const merged=[];
    for(const iv2 of ['5m','15m','1h','4h','1d']){
      try{ const a=JSON.parse(localStorage.getItem(`draw_${sym}_${iv2}`)||'[]'); if(Array.isArray(a)) merged.push(...a); }catch(e){}
    }
    if(merged.length){ drawings=merged; saveDrawings(); }
  }
}
function saveDrawings(){ localStorage.setItem(dkey(), JSON.stringify(drawings)); }
function setHint(t){ hintEl.textContent = t || ''; }

document.querySelectorAll('.tool').forEach(b => b.onclick = () => {
  resetDraft();
  tool = b.dataset.tool; sel('.tool', b);
  if(tool==='cursor') setHint('');
  else if(tool==='hline') setHint('引きたい価格をタップ');
  else if(tool==='alert') setHint('通知したい価格をタップ (到達でDiscord通知)');
  else if(tool==='copy') setHint('複写する線をタップ');
  else if(tool==='del') setHint('消したい線をタップ');
  else if(tool==='move') setHint('動かす線をタップ (端点付近=端点だけ移動)');
  else { phase='a'; setHint(`${LABELS[tool]}: 1点目をタップ`); }
  redraw();
});
document.getElementById('undo').onclick = () => { resetDraft(); drawings.pop(); saveDrawings(); redraw(); };
document.getElementById('clr').onclick = () => { if(confirm('この銘柄・足の描画を全消去?')){ drawings=[]; resetDraft(); saveDrawings(); redraw(); } };
document.getElementById('okBtn').onclick = () => {
  if(draftA && draftB){ drawings.push({type:tool, a:draftA, b:draftB, color:'#f7931a'}); saveDrawings(); }
  backToCursor();
};
document.getElementById('cancelBtn').onclick = () => backToCursor();
function showEditUI(){
  document.getElementById('okBtn').style.display='inline-block';
  document.getElementById('cancelBtn').style.display='inline-block';
  setHint('A/B点をタップで修正・ズームで拡大 → ✓確定');
}
function resetDraft(){
  phase=null; draftA=null; draftB=null; hover=null; copyState=null; moveState=null;
  document.getElementById('okBtn').style.display='none';
  document.getElementById('cancelBtn').style.display='none';
}
function nearPt(pt, dp){ const a=toXY(dp), b=toXY(pt); return a&&b&&Math.hypot(a.x-b.x,a.y-b.y)<26; }
function markPt(dp){ const a=toXY(dp); if(a){ dctx.fillStyle='#f7931a'; dctx.beginPath(); dctx.arc(a.x,a.y,6,0,7); dctx.fill(); } }

// レイの延長端点を求める (距離計算・複写プレビュー用)
function rayEnd(a, b){
  let ex=b.x, ey=b.y, dx=b.x-a.x, dy=b.y-a.y;
  if(dx!==0){ const tx = dx>0 ? dc.width : 0; const tt=(tx-a.x)/dx; ex=tx; ey=a.y+dy*tt; }
  else if(dy!==0){ ey = dy>0 ? dc.height : 0; ex=a.x; }
  return {x:ex, y:ey};
}
function segDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1, L2=dx*dx+dy*dy;
  let t = L2 ? ((px-x1)*dx+(py-y1)*dy)/L2 : 0; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy));
}
function distToDrawing(d, px, py){
  if(d.type==='hline'||d.type==='alert'){ const y=candles.priceToCoordinate(d.p); return y==null?null:Math.abs(py-y); }
  if(d.type==='trend'){ const a=toXY(d.a), b=toXY(d.b); if(!a||!b) return null; const e=rayEnd(a,b); return segDist(px,py,a.x,a.y,e.x,e.y); }
  if(d.type==='fib'){ const a=toXY(d.a), b=toXY(d.b); if(!a||!b) return null; let m=1e9;
    for(const f of FIB){ const p=d.a.p+(d.b.p-d.a.p)*f; const y=candles.priceToCoordinate(p); if(y==null) continue; if(px>=Math.min(a.x,b.x)-6) m=Math.min(m,Math.abs(py-y)); } return m; }
  return null;
}
function nearestDrawing(px, py){
  let best=-1, bd=26;
  for(let i=0;i<drawings.length;i++){ const dd=distToDrawing(drawings[i],px,py); if(dd!=null&&dd<bd){ bd=dd; best=i; } }
  return best;
}
function translated(d, dt, dp){
  if(d.type==='hline'||d.type==='alert') return {...d, p:d.p+dp};
  return {type:d.type, a:{t:d.a.t+dt, p:d.a.p+dp}, b:{t:d.b.t+dt, p:d.b.p+dp}, color:d.color};
}

// 任意の絶対時刻→x座標 (バー間を補間。timeToCoordinateは現足のバー時刻と一致しないとnullを返すため、
// 別時間足で引いた線の端点時刻でも位置を出せるようにlogicalToCoordinateで変換する)
function toX(t){
  if(!curTimes.length) return null;
  const T=curTimes, n=T.length; let idx;
  if(t<=T[0]) idx = (t-T[0])/((T[1]-T[0])||1);
  else if(t>=T[n-1]) idx = (n-1)+(t-T[n-1])/((T[n-1]-T[n-2])||1);
  else { let lo=0,hi=n-1; while(hi-lo>1){ const m=(lo+hi)>>1; if(T[m]<=t) lo=m; else hi=m; } idx=lo+(t-T[lo])/(T[hi]-T[lo]); }
  const x = chart.timeScale().logicalToCoordinate(idx);
  return (x==null)?null:x;
}
function toXY(pt){
  const x = toX(pt.t);
  const y = candles.priceToCoordinate(pt.p);
  return (x==null||y==null) ? null : {x, y};
}
function fromXY(x, y){ return {t: chart.timeScale().coordinateToTime(x), p: candles.coordinateToPrice(y)}; }
// マグネット: タップ位置を最寄りローソクの端点(O/H/L/C)に吸着
function snapPoint(cx, cy){
  const raw = fromXY(cx, cy);
  if(!magnetOn || !curKl || raw.t==null || raw.p==null) return raw;
  let best=null, bd=Infinity;
  for(const k of curKl){ const t=k[0]/1000; const d=Math.abs(t-raw.t); if(d<bd){ bd=d; best=k; } }
  if(!best) return raw;
  let bp=+best[4], pd=Infinity;
  for(const v of [+best[1],+best[2],+best[3],+best[4]]){
    const y=candles.priceToCoordinate(v); if(y==null) continue;
    const d=Math.abs(y-cy); if(d<pd){ pd=d; bp=v; }
  }
  return {t: best[0]/1000, p: bp};
}
document.getElementById('magBtn').onclick = function(){ magnetOn=!magnetOn; this.classList.toggle('on',magnetOn); };
function resizeCanvas(){
  dc.width = el.clientWidth; dc.height = el.clientHeight;
  dc.style.width = el.clientWidth+'px'; dc.style.height = el.clientHeight+'px';
  redraw();
}
function redraw(){
  dctx.clearRect(0,0,dc.width,dc.height);
  for(const d of drawings) paint(d);
  // 2点ツールの仮置きプレビュー
  if(phase==='b'){ const prev=hover||draftB; if(draftA&&prev) paint({type:tool,a:draftA,b:prev,color:'#f7931a',preview:true}); if(draftA) markPt(draftA); }
  else if(phase==='edit'){ if(draftA&&draftB) paint({type:tool,a:draftA,b:draftB,color:'#f7931a',preview:true}); if(draftA)markPt(draftA); if(draftB)markPt(draftB); }
  else if(phase==='moveA'){ const a=hover||draftA; if(a&&draftB) paint({type:tool,a:a,b:draftB,color:'#f7931a',preview:true}); if(a)markPt(a); if(draftB)markPt(draftB); }
  else if(phase==='moveB'){ const b=hover||draftB; if(draftA&&b) paint({type:tool,a:draftA,b:b,color:'#f7931a',preview:true}); if(draftA)markPt(draftA); if(b)markPt(b); }
  if(copyState && hover){                       // 複写プレビュー (元の線を平行移動)
    const dt=hover.t-copyState.anchor.t, dp=hover.p-copyState.anchor.p;
    paint({...translated(copyState.src, dt, dp), preview:true});
  }
  if(moveState && hover){                        // 移動プレビュー
    const d=moveState.src; let prev;
    if(moveState.mode==='hline') prev={...d, p:hover.p};
    else if(moveState.mode==='A') prev={...d, a:{t:hover.t,p:hover.p}};
    else if(moveState.mode==='B') prev={...d, b:{t:hover.t,p:hover.p}};
    else { const dt=hover.t-moveState.anchor.t, dp=hover.p-moveState.anchor.p; prev=translated(d, dt, dp); }
    paint({...prev, preview:true});
  }
}
function paint(d){
  dctx.lineWidth = d.preview ? 1 : 1.8;
  dctx.setLineDash(d.preview ? [4,4] : []);
  dctx.strokeStyle = d.color || '#f7931a'; dctx.font='12px sans-serif';
  if(d.type==='hline'){
    const y = candles.priceToCoordinate(d.p); if(y==null){ dctx.setLineDash([]); return; }
    dctx.beginPath(); dctx.moveTo(0,y); dctx.lineTo(dc.width,y); dctx.stroke();
    dctx.fillStyle=d.color||'#f7931a'; dctx.fillText(d.p.toPrecision(6), 4, y-4);
  } else if(d.type==='alert'){
    const y = candles.priceToCoordinate(d.p); if(y==null){ dctx.setLineDash([]); return; }
    dctx.strokeStyle='#00e5ff'; dctx.setLineDash([2,3]);
    dctx.beginPath(); dctx.moveTo(0,y); dctx.lineTo(dc.width,y); dctx.stroke();
    dctx.fillStyle='#00e5ff'; dctx.fillText('🔔 '+d.p.toPrecision(6), 4, y-4);
  } else if(d.type==='trend'){
    const a=toXY(d.a), b=toXY(d.b); if(!a||!b){ dctx.setLineDash([]); return; }
    // レイ: 始点aから2点目bを通し、bの向きに画面端まで延長
    let ex=b.x, ey=b.y, dx=b.x-a.x, dy=b.y-a.y;
    if(dx!==0){ const tx = dx>0 ? dc.width : 0; const tt=(tx-a.x)/dx; ex=tx; ey=a.y+dy*tt; }
    else if(dy!==0){ ey = dy>0 ? dc.height : 0; ex=a.x; }
    dctx.beginPath(); dctx.moveTo(a.x,a.y); dctx.lineTo(ex,ey); dctx.stroke();
  } else if(d.type==='fib'){
    const a=toXY(d.a), b=toXY(d.b); if(!a||!b){ dctx.setLineDash([]); return; }
    for(const f of FIB){
      const p = d.a.p + (d.b.p - d.a.p)*f;
      const y = candles.priceToCoordinate(p); if(y==null) continue;
      dctx.strokeStyle = f===0||f===1 ? '#e74c3c' : '#f7931a';
      dctx.beginPath(); dctx.moveTo(Math.min(a.x,b.x),y); dctx.lineTo(dc.width,y); dctx.stroke();
      dctx.fillStyle='#aeb6c2'; dctx.fillText(`${(f*100).toFixed(1)}% ${p.toPrecision(6)}`, Math.min(a.x,b.x)+4, y-4);
    }
  }
  dctx.setLineDash([]);
}
// タップ処理 (キャンバスは描画専用=非ブロック。elでタップ検出し、ドラッグ/ピンチはチャートのズーム/パンに委ねる)
function handleTap(cx, cy){
  const raw = fromXY(cx, cy);
  const pt = (tool==='copy') ? raw : snapPoint(cx,cy);
  if(pt.t==null||pt.p==null) return;
  if(tool==='del'){
    const idx = nearestDrawing(cx, cy);
    if(idx<0){ setHint('線が見つかりません。線の上をタップ'); return; }
    drawings.splice(idx,1); saveDrawings(); redraw();
    setHint('削除しました。続けて消す線をタップ / 完了はカーソル');
    return;
  }
  if(tool==='move'){
    if(!moveState){
      const idx = nearestDrawing(cx, cy);
      if(idx<0){ setHint('線が見つかりません。線の上をタップ'); return; }
      const d = drawings[idx];
      let mode = d.type==='hline' ? 'hline' : 'whole';
      if(d.type!=='hline'){ if(nearPt(pt,d.a)) mode='A'; else if(nearPt(pt,d.b)) mode='B'; }
      moveState = {idx, mode, anchor:{t:raw.t,p:raw.p}, src: JSON.parse(JSON.stringify(d))};
      setHint(mode==='whole'?'移動: 置きたい位置をタップ':(mode==='hline'?'新しい価格をタップ':mode+'点の新しい位置をタップ'));
      redraw();
    } else {
      const d=moveState.src, idx=moveState.idx;
      if(moveState.mode==='hline') drawings[idx]={...d, p:pt.p};
      else if(moveState.mode==='A') drawings[idx]={...d, a:{t:pt.t,p:pt.p}};
      else if(moveState.mode==='B') drawings[idx]={...d, b:{t:pt.t,p:pt.p}};
      else { const dt=raw.t-moveState.anchor.t, dp=raw.p-moveState.anchor.p; drawings[idx]=translated(d, dt, dp); }
      saveDrawings(); backToCursor();
    }
    return;
  }
  if(tool==='copy'){
    if(!copyState){
      const idx = nearestDrawing(cx, cy);
      if(idx<0){ setHint('線が見つかりません。線の上をタップ'); return; }
      copyState = {src: JSON.parse(JSON.stringify(drawings[idx])), anchor:{t:pt.t, p:pt.p}};
      setHint('複写: 置きたい位置をタップ'); redraw();
    } else {
      const dt=pt.t-copyState.anchor.t, dp=pt.p-copyState.anchor.p;
      drawings.push(translated(copyState.src, dt, dp)); saveDrawings(); backToCursor();
    }
    return;
  }
  if(tool==='hline'){
    drawings.push({type:'hline', p:pt.p, color:'#f7931a'}); saveDrawings(); backToCursor(); return;
  }
  if(tool==='alert'){
    drawings.push({type:'alert', p:pt.p, color:'#00e5ff'}); saveDrawings();
    if(!localStorage.getItem('discord_webhook')) setTimeout(()=>alert('価格アラートを設置しました。\n通知を受け取るには「🔔 通知設定」でDiscord Webhookを登録してください。'),50);
    backToCursor(); return;
  }
  // 2点ツール: 仮置き→ズーム/再選択可→確定
  if(phase==='a'){ draftA=pt; phase='b'; setHint(`${LABELS[tool]}: 2点目をタップ (ズーム可)`); redraw(); }
  else if(phase==='b'){ draftB=pt; phase='edit'; showEditUI(); redraw(); }
  else if(phase==='edit'){
    if(nearPt(pt, draftA)){ phase='moveA'; setHint('A点の新しい位置をタップ'); }
    else if(nearPt(pt, draftB)){ phase='moveB'; setHint('B点の新しい位置をタップ'); }
  }
  else if(phase==='moveA'){ draftA=pt; phase='edit'; showEditUI(); redraw(); }
  else if(phase==='moveB'){ draftB=pt; phase='edit'; showEditUI(); redraw(); }
}
function backToCursor(){
  resetDraft();
  tool='cursor';
  document.querySelectorAll('.tool').forEach(x => x.classList.toggle('on', x.dataset.tool==='cursor'));
  setHint(''); redraw();
}
// タップ検出: 移動<10px かつ 短時間ならタップ (それ以外はチャートのパン/ズームに任せる)
let pdX=0, pdY=0, pdT=0, pdMoved=false, pdId=null;
el.addEventListener('pointerdown', e => { pdX=e.clientX; pdY=e.clientY; pdT=Date.now(); pdMoved=false; pdId=e.pointerId; });
el.addEventListener('pointermove', e => {
  if(e.pointerId===pdId && Math.hypot(e.clientX-pdX, e.clientY-pdY)>10) pdMoved=true;
  if(e.pointerType==='mouse' && tool!=='cursor' && (phase==='b'||phase==='moveA'||phase==='moveB'||copyState||moveState)){
    const r=el.getBoundingClientRect();
    hover = (tool==='copy') ? fromXY(e.clientX-r.left, e.clientY-r.top) : snapPoint(e.clientX-r.left, e.clientY-r.top);
    redraw();
  }
});
el.addEventListener('pointerup', e => {
  if(tool==='cursor' || e.pointerId!==pdId) return;
  if(pdMoved || Date.now()-pdT>600) return;      // ドラッグ/ピンチ/長押しはチャート操作
  const r=el.getBoundingClientRect();
  handleTap(e.clientX-r.left, e.clientY-r.top);
});
chart.timeScale().subscribeVisibleTimeRangeChange(redraw);
new ResizeObserver(resizeCanvas).observe(el);

function jump(s){
  sym = s;
  document.querySelectorAll('.sym').forEach(x =>
    x.classList.toggle('on', x.dataset.sym === s));
  load(true);
  window.scrollTo({top:0, behavior:'smooth'});
}

load(true);
setInterval(() => load(false), 60000);
</script></body></html>
